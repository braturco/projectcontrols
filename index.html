<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ridgeline — A Project Controller's Story</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Kalam:wght@400;700&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;1,300&family=Merriweather:wght@400;700&family=Shadows+Into+Light&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/story.css">
<link rel="stylesheet" href="css/binder.css">
<link rel="stylesheet" href="css/alerts.css">
</head>
<body>
<div id="app">
  <nav id="sidebar"></nav>
  <main id="main">
    <div class="hero"></div>
  </main>
</div>

<!-- Doc modals injected here by engine.js -->
<div id="doc-modals"></div>

<!-- ALERT TRAY — floating notification badges -->
<div id="alert-tray"></div>

<!-- PROJECT FOLDER PANEL -->
<button class="folder-tab" onclick="toggleFolder()" id="folder-tab">
  <span class="folder-tab-icon">📁</span>
  <span class="folder-tab-label">Project Folder</span>
</button>

<div class="folder-panel" id="folder-panel">
  <div class="folder-panel-header">
    <div class="folder-panel-title">
      <span class="folder-panel-title-icon">📁</span>
      <div>
        <div class="folder-panel-title-text">Project Folder</div>
        <div class="folder-panel-title-sub">Ridgeline EA · Northern Environmental</div>
      </div>
    </div>
    <button class="folder-close" onclick="toggleFolder()">✕</button>
  </div>
  <div class="folder-body">
    <div class="folder-section">
      <div class="folder-section-label">Documents</div>
    </div>
    <div id="folder-docs">
      <div class="folder-empty" id="folder-docs-empty">Documents will appear as you progress through the story.</div>
    </div>
    <div class="folder-section" style="margin-top:8px;">
      <div class="folder-section-label">Notes</div>
    </div>
    <div id="folder-notes">
      <div class="folder-empty" id="folder-notes-empty">Notes will appear as you progress through the story.</div>
    </div>
  </div>
</div>

<script src="js/story.js"></script>
<script src="js/engine.js"></script>
</body>
</html>
